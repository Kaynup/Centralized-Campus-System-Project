# Alembic Configuration File
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file)
script_location = app/db/migrations

# Prepend sys.path so app.* imports work from within alembic
prepend_sys_path = .

# Template used to generate new revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for create_date in file template
# timezone = UTC

version_path_separator = os

# ── sqlalchemy.url is intentionally left blank here ──────────────────────────
# The URL is read programmatically from DATABASE_URL env var in env.py.
# You may override it here for local ad-hoc use, but do NOT commit real creds.
# sqlalchemy.url = mysql+pymysql://user:pass@localhost/campus_db


# ── Logging configuration ─────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
