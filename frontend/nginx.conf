server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── SPA fallback ────────────────────────────────────────────────────────
    # All routes that don't match a real file are served index.html so
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires      1y;
        add_header   Cache-Control "public, immutable";
        access_log   off;
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
}
